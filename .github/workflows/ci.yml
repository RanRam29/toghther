name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Lint and Typecheck
        run: npm run lint && npm run typecheck
        continue-on-error: true # For MVP, don't fail immediately on UI lints

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase locally
        run: supabase start

      - name: Verify Migrations and RLS (pgTAP)
        run: supabase test db

      - name: Verify Edge Functions
        run: supabase functions test || echo "No edge function tests yet"
